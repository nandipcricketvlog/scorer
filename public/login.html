<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Scorer — Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#070d1f;
  font-family:'Barlow Condensed',system-ui,sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
}

/* animated background grid */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,.04) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}

.card{
  background:rgba(10,18,42,.97);
  border:1px solid rgba(0,229,255,.2);
  border-radius:16px;
  padding:40px 36px;
  width:100%;max-width:400px;
  box-shadow:0 0 80px rgba(0,229,255,.08);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#00e5ff,#ff4081);
}

.logo{
  text-align:center;margin-bottom:32px;
}
.logo-icon{font-size:48px;line-height:1;}
.logo-title{
  font-size:28px;font-weight:900;color:#fff;
  letter-spacing:2px;text-transform:uppercase;margin-top:8px;
}
.logo-sub{font-size:13px;color:rgba(255,255,255,.35);letter-spacing:1px;margin-top:2px;}

.field{margin-bottom:20px;}
.field label{
  display:block;font-size:12px;font-weight:700;
  color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:2px;
  margin-bottom:8px;
}
.field input{
  width:100%;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:8px;color:#fff;
  padding:14px 16px;font-size:17px;font-family:inherit;
  transition:border-color .2s, box-shadow .2s;
  -webkit-appearance:none;
}
.field input:focus{
  outline:none;border-color:#00e5ff;
  box-shadow:0 0 0 3px rgba(0,229,255,.12);
}
.field input::placeholder{color:rgba(255,255,255,.2);}

.btn-login{
  width:100%;background:#00e5ff;color:#000;
  border:none;border-radius:8px;
  padding:16px;font-size:17px;font-weight:800;
  font-family:inherit;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;transition:all .15s;margin-top:4px;
}
.btn-login:hover{background:#33eeff;transform:translateY(-1px);}
.btn-login:active{transform:translateY(0);}

.error-msg{
  background:rgba(255,68,102,.12);
  border:1px solid rgba(255,68,102,.3);
  border-radius:8px;padding:12px 16px;
  color:#ff4466;font-size:14px;font-weight:600;
  margin-bottom:20px;text-align:center;
  display:none;
}
.error-msg.show{display:block;}

.hint{
  text-align:center;margin-top:20px;
  font-size:12px;color:rgba(255,255,255,.2);
}
.hint strong{color:rgba(255,255,255,.4);}

/* show password toggle */
.pw-wrap{position:relative;}
.pw-toggle{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:rgba(255,255,255,.3);
  cursor:pointer;font-size:18px;padding:4px;
  transition:color .15s;
}
.pw-toggle:hover{color:rgba(255,255,255,.7);}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🏏</div>
    <div class="logo-title">Cricket Scorer</div>
    <div class="logo-sub">Admin Panel</div>
  </div>

  <div class="error-msg" id="err">Incorrect password. Please try again.</div>

  <form method="POST" action="/login">
    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" name="password" id="pw"
               placeholder="Enter admin password"
               autocomplete="current-password" autofocus>
        <button type="button" class="pw-toggle" onclick="togglePw()" id="eye">👁</button>
      </div>
    </div>
    <button type="submit" class="btn-login">Sign In →</button>
  </form>

  <div class="hint">
    OBS overlays don't need a login — use the URLs directly.<br>
    <strong>Set your password via the ADMIN_PASSWORD environment variable.</strong>
  </div>
</div>

<script>
  // Show error if redirected back with ?error=1
  if (location.search.includes('error=1')) {
    document.getElementById('err').classList.add('show');
  }

  function togglePw() {
    const inp = document.getElementById('pw');
    const eye = document.getElementById('eye');
    if (inp.type === 'password') { inp.type = 'text'; eye.textContent = '🙈'; }
    else { inp.type = 'password'; eye.textContent = '👁'; }
  }
</script>
</body>
</html>
