<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent!important;overflow:hidden;width:1920px;height:1080px;font-family:'Barlow Condensed',sans-serif;}

/* ── OUTER WRAPPER ── */
.lt{
  position:absolute;bottom:0;left:0;right:0;
  animation:slideUp .4s cubic-bezier(.22,1,.36,1) both;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ── THIN TOP ACCENT ── */
.lt-accent{height:4px;}

/* ── MAIN BAR ── */
.lt-bar{
  display:flex;align-items:stretch;height:88px;
  background:#0d1b2e;
  position:relative;overflow:hidden;
}
/* subtle sheen */
.lt-bar::after{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.06) 0%,transparent 60%);pointer-events:none;}

/* score-flash */
@keyframes flash{0%{filter:brightness(2.2)}100%{filter:brightness(1)}}
.lt-bar.flash{animation:flash .5s ease-out forwards;}

/* ── TEAM BLOCK (left) ── */
.lt-team{
  display:flex;align-items:stretch;flex-shrink:0;
}
.lt-team-stripe{width:8px;flex-shrink:0;}
.lt-team-body{
  display:flex;flex-direction:column;justify-content:center;
  padding:0 20px 0 16px;min-width:220px;
}
.lt-team-name{
  font-size:13px;font-weight:700;color:rgba(255,255,255,.55);
  text-transform:uppercase;letter-spacing:3px;line-height:1;margin-bottom:2px;
}
.lt-team-score{
  font-size:52px;font-weight:900;color:#fff;
  line-height:.95;letter-spacing:-2px;font-family:'Barlow',sans-serif;
}
.lt-team-overs{
  font-size:13px;font-weight:600;color:rgba(255,255,255,.5);
  line-height:1;margin-top:3px;letter-spacing:.5px;
}

/* ── DIVIDER ── */
.lt-div{width:1px;background:rgba(255,255,255,.1);margin:12px 0;flex-shrink:0;}

/* ── RATES BLOCK ── */
.lt-rates{
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:0 22px;gap:5px;flex-shrink:0;
}
.lt-inn-label{
  font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  padding:2px 10px;border-radius:2px;color:#fff;
}
.lt-rates-row{display:flex;gap:20px;align-items:center;}
.lt-rate{display:flex;flex-direction:column;align-items:center;}
.lt-rate-val{font-size:26px;font-weight:900;line-height:1;}
.lt-rate-val.crr{color:#00e5ff;}
.lt-rate-val.rrr{color:#ff7744;}
.lt-rate-val.tgt{color:#ffcc00;}
.lt-rate-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.4);letter-spacing:1.5px;text-transform:uppercase;}
.lt-rate-sep{width:1px;height:28px;background:rgba(255,255,255,.12);}

/* ── BATSMEN BLOCK ── */
.lt-bats{display:flex;align-items:stretch;flex:1;min-width:0;}

.lt-bat{
  display:flex;flex-direction:column;justify-content:center;
  padding:0 18px;flex:1;min-width:0;position:relative;
}
.lt-bat.striker{background:rgba(255,204,0,.055);}
.lt-bat.striker::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:#ffcc00;}
.lt-bat.nonstriker::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;background:rgba(255,255,255,.1);}

.lt-bat-tag{
  font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,.35);line-height:1;margin-bottom:3px;
}
.lt-bat.striker .lt-bat-tag{color:#ffcc00;}

.lt-bat-name{
  font-size:20px;font-weight:800;color:rgba(255,255,255,.92);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-transform:uppercase;line-height:1.1;letter-spacing:.5px;
}
.lt-bat.striker .lt-bat-name{color:#ffcc00;}

.lt-bat-row{display:flex;align-items:baseline;gap:4px;margin-top:2px;}
.lt-bat-runs{
  font-size:30px;font-weight:900;line-height:1;color:rgba(255,255,255,.9);
  font-family:'Barlow',sans-serif;
}
.lt-bat.striker .lt-bat-runs{color:#ffcc00;}
.lt-bat-balls{font-size:15px;font-weight:600;color:rgba(255,255,255,.45);}
.lt-bat-stats{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px;letter-spacing:.3px;}
.lt-bat-stats .f{color:#66dd88;}
.lt-bat-stats .s{color:#ffcc00;}

/* ── BALL DOTS ── */
.lt-balls-wrap{
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:0 18px;flex-shrink:0;gap:4px;
}
.lt-balls-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.5px;}
.lt-balls{display:flex;gap:5px;align-items:center;}
.ball{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;border:2px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);
  flex-shrink:0;
}
.ball.b4{border-color:#44cc66;color:#44cc66;background:rgba(68,204,102,.1);}
.ball.b6{border-color:#ffcc00;color:#ffcc00;background:rgba(255,204,0,.1);}
.ball.bw{border-color:#ff3355;color:#ff3355;background:rgba(255,51,85,.1);}
.ball.bx{border-color:#bbaa00;color:#bbaa00;background:rgba(187,170,0,.08);}
.ball.bd{opacity:.22;}

/* ── BOWLER BLOCK ── */
.lt-bowl{
  display:flex;flex-direction:column;justify-content:center;
  padding:0 22px 0 16px;flex-shrink:0;min-width:200px;
}
.lt-bowl-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px;margin-bottom:2px;}
.lt-bowl-name{
  font-size:18px;font-weight:800;color:#fff;text-transform:uppercase;
  letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.1;
}
.lt-bowl-fig{font-size:26px;font-weight:900;color:#00e5ff;line-height:1;font-family:'Barlow',sans-serif;}
.lt-bowl-det{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px;}
</style>
</head>
<body>
<div class="lt" id="lt">
  <div class="lt-accent" id="lt-accent"></div>
  <div class="lt-bar" id="lt-bar">

    <!-- Team score -->
    <div class="lt-team">
      <div class="lt-team-stripe" id="lt-stripe"></div>
      <div class="lt-team-body">
        <div class="lt-team-name" id="lt-tname">TEAM</div>
        <div class="lt-team-score" id="lt-tscore">0/0</div>
        <div class="lt-team-overs" id="lt-tovers">0.0 / 20 ov</div>
      </div>
    </div>

    <div class="lt-div"></div>

    <!-- CRR / RRR / Target -->
    <div class="lt-rates">
      <div class="lt-inn-label" id="lt-inn-lbl">1ST INN</div>
      <div class="lt-rates-row">
        <div class="lt-rate">
          <div class="lt-rate-val crr" id="lt-crr">0.00</div>
          <div class="lt-rate-lbl">CRR</div>
        </div>
        <div class="lt-rate-sep" id="lt-rrr-sep" style="display:none"></div>
        <div class="lt-rate" id="lt-rrr-wrap" style="display:none">
          <div class="lt-rate-val rrr" id="lt-rrr">0.00</div>
          <div class="lt-rate-lbl">RRR</div>
        </div>
        <div class="lt-rate-sep" id="lt-tgt-sep" style="display:none"></div>
        <div class="lt-rate" id="lt-tgt-wrap" style="display:none">
          <div class="lt-rate-val tgt" id="lt-tgt">0</div>
          <div class="lt-rate-lbl">TARGET</div>
        </div>
      </div>
    </div>

    <div class="lt-div"></div>

    <!-- Batsmen -->
    <div class="lt-bats">
      <div class="lt-bat striker">
        <div class="lt-bat-tag">★ ON STRIKE</div>
        <div class="lt-bat-name" id="bs-name">—</div>
        <div class="lt-bat-row">
          <div class="lt-bat-runs" id="bs-r">0</div>
          <div class="lt-bat-balls" id="bs-b">(0)</div>
        </div>
        <div class="lt-bat-stats"><span class="f" id="bs-4">0</span>×4 &nbsp;<span class="s" id="bs-6">0</span>×6</div>
      </div>
      <div class="lt-bat nonstriker">
        <div class="lt-bat-tag">NON-STRIKER</div>
        <div class="lt-bat-name" id="bns-name">—</div>
        <div class="lt-bat-row">
          <div class="lt-bat-runs" id="bns-r">0</div>
          <div class="lt-bat-balls" id="bns-b">(0)</div>
        </div>
        <div class="lt-bat-stats"><span class="f" id="bns-4">0</span>×4 &nbsp;<span class="s" id="bns-6">0</span>×6</div>
      </div>
    </div>

    <div class="lt-div"></div>

    <!-- Ball dots -->
    <div class="lt-balls-wrap">
      <div class="lt-balls-lbl" id="lt-ov-lbl">OVER 1</div>
      <div class="lt-balls" id="lt-balls"></div>
    </div>

    <div class="lt-div"></div>

    <!-- Bowler -->
    <div class="lt-bowl">
      <div class="lt-bowl-lbl">BOWLING</div>
      <div class="lt-bowl-name" id="lt-bowl-n">—</div>
      <div class="lt-bowl-fig" id="lt-bowl-f">0-0</div>
      <div class="lt-bowl-det" id="lt-bowl-d"></div>
    </div>

  </div>
</div>

<script>
let prevScore = null;

function ws() {
  const w = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`);
  w.onmessage = e => { const m=JSON.parse(e.data); if(m.type==='state') render(m.payload); };
  w.onclose = () => setTimeout(ws,3000);
  w.onerror = () => w.close();
}

function g(id){return document.getElementById(id);}
function show(id){g(id).style.display='';}
function hide(id){g(id).style.display='none';}

function render(S) {
  if (!S||!S.innings.length||S.status==='setup') return;
  const inn = S.innings[S.currentInnings-1];
  if (!inn) return;
  const m = S.match;
  const battTeam = m[inn.battingTeamKey];

  // Accent bar = team1 | team2 colours
  g('lt-accent').style.background=`linear-gradient(90deg,${m.team1.color} 50%,${m.team2.color} 50%)`;
  g('lt-stripe').style.background = battTeam.color;

  // Flash on score change
  if (prevScore!==null && prevScore!==inn.score) {
    const bar=g('lt-bar'); bar.classList.remove('flash'); void bar.offsetWidth; bar.classList.add('flash');
  }
  prevScore = inn.score;

  g('lt-tname').textContent = (battTeam.shortName||battTeam.name).toUpperCase();
  g('lt-tscore').textContent = `${inn.score}/${inn.wickets}`;
  g('lt-tovers').textContent = `${inn.oversCompleted}.${inn.currentOverBalls} / ${m.overs} OV`;
  g('lt-inn-lbl').textContent = S.currentInnings===1?'1ST INN':'2ND INN';
  g('lt-inn-lbl').style.background = battTeam.color;

  // Rates
  const balls = inn.oversCompleted*6+inn.currentOverBalls;
  g('lt-crr').textContent = balls>0 ? (inn.score/balls*6).toFixed(2) : '0.00';

  if (inn.target) {
    const bl=m.overs*6-balls, need=inn.target-inn.score;
    g('lt-rrr').textContent = bl>0&&need>0 ? (need/bl*6).toFixed(2) : '0.00';
    g('lt-tgt').textContent = inn.target;
    show('lt-rrr-sep');show('lt-rrr-wrap');show('lt-tgt-sep');show('lt-tgt-wrap');
  } else {
    hide('lt-rrr-sep');hide('lt-rrr-wrap');hide('lt-tgt-sep');hide('lt-tgt-wrap');
  }

  // Batsmen
  const bs=inn.batsmen.find(b=>b.id===inn.onStrike);
  const bns=inn.batsmen.find(b=>b.id===inn.onNonStrike);
  if(bs){g('bs-name').textContent=bs.name.toUpperCase();g('bs-r').textContent=bs.runs;g('bs-b').textContent=`(${bs.balls})`;g('bs-4').textContent=bs.fours;g('bs-6').textContent=bs.sixes;}
  if(bns){g('bns-name').textContent=bns.name.toUpperCase();g('bns-r').textContent=bns.runs;g('bns-b').textContent=`(${bns.balls})`;g('bns-4').textContent=bns.fours;g('bns-6').textContent=bns.sixes;}

  // Ball dots
  const cur=inn.currentOverBallHistory||[];
  const last=inn.overHistory[inn.overHistory.length-1];
  const disp=cur.length>0?cur:(last?.balls||[]);
  g('lt-ov-lbl').textContent=`OVER ${cur.length>0?inn.oversCompleted+1:inn.oversCompleted}`;
  g('lt-balls').innerHTML = disp.slice(-8).map(b=>{
    let c='ball';
    if(b.isWicket) c+=' bw';
    else if(b.batsmanRuns===4) c+=' b4';
    else if(b.batsmanRuns===6) c+=' b6';
    else if(b.type==='wide'||b.type==='noball') c+=' bx';
    else if(b.totalRuns===0) c+=' bd';
    return `<div class="${c}">${b.display}</div>`;
  }).join('')||[...Array(6)].map(()=>`<div class="ball bd">·</div>`).join('');

  // Bowler
  const bowl=inn.bowlers.find(b=>b.id===inn.currentBowler);
  if(bowl){
    g('lt-bowl-n').textContent=bowl.name.toUpperCase();
    g('lt-bowl-f').textContent=`${bowl.wickets}-${bowl.runs}`;
    const ov=`${Math.floor(bowl.legalBalls/6)}.${bowl.legalBalls%6}`;
    const eco=bowl.legalBalls>0?(bowl.runs/bowl.legalBalls*6).toFixed(2):'—';
    g('lt-bowl-d').textContent=`${ov} OV  ECO ${eco}`;
  } else {
    g('lt-bowl-n').textContent='—';g('lt-bowl-f').textContent='';g('lt-bowl-d').textContent='';
  }
}
ws();
</script>
</body>
</html>
