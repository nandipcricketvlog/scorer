services:
  - type: web
    name: cricket-scorer
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cricket-scorer-db
          property: connectionString

databases:
  - name: cricket-scorer-db
    plan: free
    databaseName: cricket_scorer
    user: cricket_scorer
